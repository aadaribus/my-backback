<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Página principal de tu mochila digital">
    <meta name="theme-color" content="#222">
    <title>Inicio - Mi Mochila</title>
    <link rel="stylesheet" href="/stylehome.css">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar" role="navigation" aria-label="Navegación principal">
    <a href="#" aria-label="Ir a inicio">Inicio</a>
    <a href="#" aria-label="Ver materias">Materias</a>
    <a href="#" aria-label="Ver tareas">Tareas</a>
    <a href="#" aria-label="Ver perfil">Perfil</a>
    <a href="/" class="logout-link" aria-label="Cerrar sesión">
      <img src="/assets/cerrar.png" alt="Cerrar sesión" class="logout-icon" loading="lazy">
    </a>
  </nav>

  <!-- Contenido principal -->
  <main role="main" class="main-content">
    <section class="admateria" aria-label="Materias">
      <!-- Contenedor Principal -->
      <div class="asignature">
        <!-- Área de contenido o título -->
        <div class="signature-header">
          <h2>Asignatura</h2>
        </div>

        <!-- Contenedor de la lista de herramientas multimedia -->
        <ul class="media-actions-list" aria-label="Herramientas multimedia">
          <li>
            <a href="#" aria-label="Agregar texto">
              <img src="/assets/adtex.png" alt="Texto" class="btn-custom-icon" loading="lazy"> 
              <span>Texto</span>
            </a>
          </li>
          <li>
            <a href="#" aria-label="Agregar imagen">
              <img src="/assets/cam.png" alt="Imagen" class="btn-custom-icon" loading="lazy"> 
              <span>Imagen</span>
            </a>
          </li>
          <li>
            <a href="#" aria-label="Agregar video">
              <img src="/assets/video.png" alt="Video" class="btn-custom-icon" loading="lazy"> 
              <span>Video</span>
            </a>
          </li>
          <li>
            <a href="#" aria-label="Agregar audio">
              <img src="/assets/micro.png" alt="Audio" class="btn-custom-icon" loading="lazy"> 
              <span>Audio</span>
            </a>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <!-- Botón flotante para agregar contenido -->
  <button class="fab" id="fab" aria-label="Menú de opciones" aria-expanded="false" aria-controls="fabMenu">+</button>

  <!-- Menú desplegable -->
  <div class="fab-menu" id="fabMenu" role="menu" aria-label="Opciones de menú">
    <button data-form="materia" role="menuitem">Agregar Materia</button>
    <button data-form="perfil" role="menuitem">Editar Perfil</button>
    <button data-form="apunte" role="menuitem">Apuntes Rápidos</button>
    <button data-form="grupo" role="menuitem">Grupos</button>
    <button data-form="evento" role="menuitem">Eventos</button>
  </div>

  <!-- Formularios flotantes Modal -->
  <div class="modal" id="modal" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-content">
      <button class="close" id="close" aria-label="Cerrar modal">&times;</button>
      <form id="formContent">
        <!-- Aquí se inyecta el formulario según la opción -->
      </form>
    </div>
  </div>

  <script src="/home.js"></script>
</body>
</html>
