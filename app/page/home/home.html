<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/stylehome.css">
    <link rel="stylesheet" href="https://cloudflare.com">ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">


</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar">
    <a href="#">Inicio</a>
    <a href="#">Materias</a>
    <a href="#">Tareas</a>
    <a href="#">Perfil</a>
    <a href="/" class="logout-link">
      <img src="/cerrar.png" alt="Cerrar sesión" class="logout-icon">
      
    </a>
  </nav>

  <!-- Contenido principal -->
  <main class="admateria">
<!-- Contenedor Principal -->
<div class="asignature">
  
  <!-- Icono superior derecho para cerrar -->
  <button type="button" class="close-btn" title="Cerrar" aria-label="Cerrar">
    <i class="fas fa-times"></i>
  </button>

  <!-- Área de contenido o título (opcional, para dar contexto) -->
  <div class="signature-header">
    <h3>Asignatura</h3>
  </div>

  <!-- Contenedor de la lista de herramientas multimedia -->
  <ul class="media-actions-list">
    <li>
      <button type="button" title="Agregar texto.">
        <i class="fas fa-file-alt"></i> <span>Texto</span>
      </button>
    </li>
    <li>
      <button type="button" title="Agregar foto">
        <i class="fas fa-image"></i> <span>Foto</span>
      </button>
    </li>
    <li>
      <button type="button" title="Agregar video">
        <i class="fas fa-video"></i> <span>Video</span>
      </button>
    </li>
    <li>
      <button type="button" title="Agregar audio">
        <i class="fas fa-microphone"></i> <span>Audio</span>
      </button>
    </li>
  </ul>

  <!-- Bloque inferior de acciones (Guardar y Cancelar) -->
  <div class="form-actions">
    <button type="button" class="btn-cancel">Cancelar</button>
    <button type="submit" class="btn-save">Guardar</button>
  </div>

</div>

  </main>

  <!-- Botón flotante -->
  <button class="fab" id="fab">+</button>

  <!-- Menú desplegable -->
  <div class="fab-menu" id="fabMenu">
    <button data-form="materia">Agregar Materia</button>
    <button data-form="perfil">Editar Perfil</button>
    <button data-form="apunte">Apuntes Rápidos</button>
    <button data-form="grupo">Grupos</button>
    <button data-form="evento">Eventos</button>
  </div>

  <!-- Formularios flotantes -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" id="close">&times;</span>
      <form id="formContent">
        <!-- Aquí se inyecta el formulario según la opción -->
      </form>
    </div>
  </div>

  <script src="/home.js"></script>
</body>
</html>
