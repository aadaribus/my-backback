<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Inicia sesión en tu cuenta">
    <meta name="theme-color" content="#5e3a22">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main role="main">
        <div class="form-container">
            <h1>Iniciar sesión</h1>
            <p>Ingresa usuario y contraseña para ingresar</p>
            <form id="login-form" method="POST" novalidate>
                <div>
                    <label class="sr-only" for="user">Usuario</label>
                    <input 
                        type="text" 
                        id="user" 
                        name="username" 
                        placeholder="Nombre de usuario"
                        required
                        autocomplete="username"
                        aria-label="Nombre de usuario"
                    >
                </div>
                <div class="password-container">
                    <label class="sr-only" for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Contraseña"
                            required
                            autocomplete="current-password"
                            aria-label="Contraseña"
                        >
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña" title="Mostrar/ocultar contraseña">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-closed-icon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" aria-label="Iniciar sesión">Iniciar sesión</button>
                <p class="error escondido" role="alert" aria-live="polite">Error al iniciar sesión</p>
            </form>
            <p>Si aún no tienes una cuenta, <a href="/register" aria-label="Ir a página de registro">Registrar</a></p>
        </div>
    </main>
   
    <script src="/login.js" defer></script>
     <footer class="pie">
    <p>&copy; 2026 Aadaribusweb. Todos los derechos reservados.</p>
</footer>
</body>
</html>
